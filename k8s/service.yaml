apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
spec:
  # ClusterIP робить сервіс доступним тільки всередині кластера
  type: ClusterIP
  selector:
    app: web # Знаходить поди з цією міткою
  ports:
    - port: 80
      targetPort: 8080 # Перенаправляє трафік на порт 8080 контейнера
      protocol: TCP
