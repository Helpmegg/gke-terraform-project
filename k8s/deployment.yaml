apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: web-app-ksa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: app
          image: "europe-west1-docker.pkg.dev/gke-petproject-2026/my-repo/my-app:latest"
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "app_user"
            - name: DB_NAME
              value: "app_db"
          volumeMounts:
            - name: secret-volume
              mountPath: "/secrets"
              readOnly: true
            # Примонтовано tmp-volume для запису тимчасових файлів Gunicorn (heartbeats).
            # Це дозволяє використовувати readOnlyRootFilesystem: true для головної ФС, 
            # відповідаючи принципу "Незмінної інфраструктури" (Immutable Infrastructure).
            - name: tmp-volume
              mountPath: "/tmp"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

        - name: cloud-sql-proxy
          image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0"
          # Kubernetes підставляє $(DB_INSTANCE_CONNECTION_NAME) з env нижче.
          # Реальне значення отримай командою:
          #   terraform -chdir=environments/dev output -raw db_instance_connection_name
          # та встав у env нижче, або передавай через CI/CD:
          #   kubectl set env deployment/web-app -c cloud-sql-proxy DB_INSTANCE_CONNECTION_NAME=<value>
          args:
            - "--private-ip"
            - "$(DB_INSTANCE_CONNECTION_NAME)"
          env:
            - name: DB_INSTANCE_CONNECTION_NAME
              # ЗАМІНИТИ на реальний connection name вигляду: gke-petproject-2026:europe-west1:gke-pet-db-XXXXXXXX
              # Отримати: terraform -chdir=environments/dev output -raw db_instance_connection_name
              value: "gke-petproject-2026:europe-west1:gke-pet-db-2fc48b59"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: secret-volume
          csi:
            driver: "secrets-store-gke.csi.k8s.io"
            readOnly: true
            volumeAttributes:
              secretProviderClass: "db-credentials-provider"
        # Том типу emptyDir для зберігання тимчасових даних під час життя Pod'а
        - name: tmp-volume
          emptyDir: {}
