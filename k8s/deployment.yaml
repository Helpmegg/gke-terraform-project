apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # Додаємо toleration, щоб поди могли шедулитися на workload-pool (який ми за-taint-или)
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      serviceAccountName: web-app-ksa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: app
          image: "europe-west1-docker.pkg.dev/gke-petproject-2026/my-repo/my-app:latest"
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "app_user"
            - name: DB_NAME
              value: "app_db"
          volumeMounts:
            - name: secret-volume
              mountPath: "/secrets"
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

        - name: cloud-sql-proxy
          image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0"
          args:
            - "--private-ip"
            - "<INSTANCE_CONNECTION_NAME>"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: secret-volume
          csi:
            driver: "secrets.csi.gke.io"
            readOnly: true
            volumeAttributes:
              secretProviderClass: "<DB_PASSWORD_SECRET_ID>"
