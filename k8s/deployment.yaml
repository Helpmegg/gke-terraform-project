apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      # Важливо: вкажіть ім'я Service Account, який має доступ до Secret Manager та Cloud SQL
      serviceAccountName: gke-sa 
      containers:
        - name: app
          # TODO: Замініть на ваш реальний образ з Artifact Registry
          image: europe-west1-docker.pkg.dev/gke-petproject-2026/pet-project-repo/my-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "127.0.0.1" # Підключення до проксі всередині пода
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              # Це значення ми передали з Terraform модуля db
              value: "app_user" 
            - name: DB_NAME
              # Це значення ми передали з Terraform модуля db
              value: "app_db"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  # Цей секрет має бути створений в Kubernetes.
                  # Він повинен містити пароль з Google Secret Manager.
                  # Для цього використовується External Secrets Operator або Secret Store CSI Driver.
                  name: db-credentials 
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            # TODO: Замініть на реальний connection name з output'у Terraform модуля db
            - "--private-ip"
            - "YOUR_INSTANCE_CONNECTION_NAME" # module.db.instance_connection_name
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
