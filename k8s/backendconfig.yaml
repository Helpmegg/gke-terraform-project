apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: web-app-backendconfig
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /healthz
    # ВАЖЛИВО: має збігатись із nodePort у service.yaml (30080)
    # GCE LB перевіряє ноду на цьому NodePort, а не на порті контейнера (8080)
    port: 30080
