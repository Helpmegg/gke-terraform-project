---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-app-ksa
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: gke-nodes-sa@gke-petproject-2026.iam.gserviceaccount.com
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: db-credentials-provider
spec:
  provider: gke
  parameters:
    secrets: |
      # ЗАМІНИТИ <SECRET_ID> на реальне ім'я секрету вигляду: db-password-XXXXXXXX
      # Отримати командою: terraform -chdir=environments/dev output -raw db_password_secret_id
      # Або через gcloud: gcloud secrets list --filter="name:db-password" --format="value(name)"
      - resourceName: "projects/gke-petproject-2026/secrets/db-password-2fc48b59/versions/latest"
        path: "db-password"
